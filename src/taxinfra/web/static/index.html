<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaxInfra — AI Tax Operations</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-2: #232733;
      --border: #2e3345;
      --text: #e4e6ed;
      --text-dim: #8b8fa3;
      --accent: #6c8cff;
      --accent-hover: #8aa3ff;
      --green: #34d399;
      --yellow: #fbbf24;
      --red: #f87171;
      --orange: #fb923c;
      --purple: #a78bfa;
      --radius: 8px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    a { color: var(--accent); text-decoration: none; }

    /* Layout */
    .shell { display: flex; height: 100vh; }
    .sidebar {
      width: 240px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-header h1 { font-size: 18px; font-weight: 700; }
    .sidebar-header p { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
    .nav { padding: 12px; flex: 1; }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: var(--radius);
      cursor: pointer;
      color: var(--text-dim);
      font-size: 14px;
      transition: all 0.15s;
    }
    .nav-item:hover { background: var(--surface-2); color: var(--text); }
    .nav-item.active { background: var(--accent); color: #fff; }
    .nav-item .icon { width: 18px; text-align: center; }
    .nav-item .badge {
      margin-left: auto;
      background: var(--red);
      color: #fff;
      font-size: 11px;
      padding: 1px 7px;
      border-radius: 10px;
      font-weight: 600;
    }
    .main { flex: 1; overflow-y: auto; }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 28px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .topbar h2 { font-size: 16px; font-weight: 600; }
    .content { padding: 28px; }

    /* Status badge */
    .status {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
    }
    .status::before { content: ''; width: 6px; height: 6px; border-radius: 50%; }
    .status-completed, .status-accepted { background: rgba(52,211,153,0.15); color: var(--green); }
    .status-completed::before, .status-accepted::before { background: var(--green); }
    .status-in_progress, .status-running, .status-submitted { background: rgba(108,140,255,0.15); color: var(--accent); }
    .status-in_progress::before, .status-running::before, .status-submitted::before { background: var(--accent); }
    .status-waiting_for_approval, .status-in_review { background: rgba(251,191,36,0.15); color: var(--yellow); }
    .status-waiting_for_approval::before, .status-in_review::before { background: var(--yellow); }
    .status-failed, .status-rejected { background: rgba(248,113,113,0.15); color: var(--red); }
    .status-failed::before, .status-rejected::before { background: var(--red); }
    .status-draft { background: rgba(139,143,163,0.15); color: var(--text-dim); }
    .status-draft::before { background: var(--text-dim); }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .card-title { font-size: 14px; font-weight: 600; }

    /* Stat grid */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }
    .stat-label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-value { font-size: 28px; font-weight: 700; margin-top: 4px; }
    .stat-sub { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

    /* Table */
    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left;
      padding: 10px 14px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 12px 14px;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
    }
    tr:hover td { background: var(--surface-2); }
    tr { cursor: pointer; }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--border); }
    .btn-sm { padding: 5px 12px; font-size: 12px; }
    .btn-approve { background: var(--green); color: #000; }
    .btn-approve:hover { opacity: 0.9; }

    /* Detail panel */
    .detail-panel {
      position: fixed;
      right: -480px;
      top: 0;
      width: 480px;
      height: 100vh;
      background: var(--surface);
      border-left: 1px solid var(--border);
      overflow-y: auto;
      transition: right 0.25s ease;
      z-index: 100;
    }
    .detail-panel.open { right: 0; }
    .detail-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--surface);
    }
    .detail-close { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 20px; }
    .detail-body { padding: 20px; }
    .detail-section { margin-bottom: 20px; }
    .detail-section h4 { font-size: 11px; text-transform: uppercase; color: var(--text-dim); letter-spacing: 0.5px; margin-bottom: 8px; }
    .detail-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; }
    .detail-row .label { color: var(--text-dim); }
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 99;
      display: none;
    }
    .overlay.open { display: block; }

    /* Timeline */
    .timeline { position: relative; padding-left: 24px; }
    .timeline::before {
      content: '';
      position: absolute;
      left: 7px;
      top: 4px;
      bottom: 4px;
      width: 2px;
      background: var(--border);
    }
    .timeline-item { position: relative; margin-bottom: 16px; }
    .timeline-item::before {
      content: '';
      position: absolute;
      left: -20px;
      top: 6px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--surface);
    }
    .timeline-item.success::before { background: var(--green); }
    .timeline-item.warning::before { background: var(--yellow); }
    .timeline-item.error::before { background: var(--red); }
    .timeline-time { font-size: 11px; color: var(--text-dim); }
    .timeline-text { font-size: 13px; margin-top: 2px; }

    /* Traceability chain */
    .trace-node {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      background: var(--surface-2);
      border-radius: var(--radius);
      margin-bottom: 4px;
      font-size: 13px;
    }
    .trace-arrow { text-align: center; color: var(--text-dim); font-size: 18px; margin: 2px 0; padding-left: 20px; }
    .trace-type {
      font-size: 10px;
      padding: 2px 8px;
      background: rgba(108,140,255,0.15);
      color: var(--accent);
      border-radius: 4px;
      font-weight: 600;
      text-transform: uppercase;
    }

    /* Recommendations / warnings */
    .rec-item {
      display: flex;
      gap: 10px;
      padding: 10px 14px;
      background: var(--surface-2);
      border-radius: var(--radius);
      margin-bottom: 6px;
      font-size: 13px;
      border-left: 3px solid var(--accent);
    }
    .rec-item.warning { border-left-color: var(--yellow); }
    .rec-item.error { border-left-color: var(--red); }

    /* Tax determination form */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-group { display: flex; flex-direction: column; gap: 4px; }
    .form-group.full { grid-column: 1 / -1; }
    .form-group label { font-size: 12px; color: var(--text-dim); font-weight: 500; }
    .form-group input, .form-group select {
      padding: 8px 12px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 13px;
    }
    .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--accent); }
    .result-box {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-top: 16px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 13px;
      white-space: pre-wrap;
      max-height: 300px;
      overflow-y: auto;
    }

    /* Checkbox */
    .checkbox-group { flex-direction: row !important; align-items: center; }
    .checkbox-group input { width: auto; }

    /* Tabs */
    .tabs { display: flex; gap: 2px; margin-bottom: 20px; }
    .tab {
      padding: 8px 16px;
      font-size: 13px;
      color: var(--text-dim);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 40px;
      color: var(--text-dim);
    }
    .empty-icon { font-size: 36px; margin-bottom: 8px; }

    /* Loading */
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="shell">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">
        <h1>TaxInfra</h1>
        <p>AI Tax Operations</p>
      </div>
      <div class="nav">
        <div class="nav-item active" data-page="dashboard">
          <span class="icon">&#9633;</span> Dashboard
        </div>
        <div class="nav-item" data-page="agents">
          <span class="icon">&#9881;</span> Agents
        </div>
        <div class="nav-item" data-page="transactions">
          <span class="icon">&#8644;</span> Transactions
        </div>
        <div class="nav-item" data-page="determine">
          <span class="icon">&#9874;</span> Tax Engine
        </div>
        <div class="nav-item" data-page="countries">
          <span class="icon">&#9788;</span> Countries
        </div>
        <div class="nav-item" data-page="decisions">
          <span class="icon">&#9888;</span> Decisions
          <span class="badge" id="pending-badge" style="display:none">0</span>
        </div>
        <div class="nav-item" data-page="audit-trail">
          <span class="icon">&#9776;</span> Audit Trail
        </div>
      </div>
    </div>

    <!-- Main -->
    <div class="main">
      <div class="topbar">
        <h2 id="page-title">Dashboard</h2>
        <div id="topbar-actions"></div>
      </div>
      <div class="content" id="content"></div>
    </div>
  </div>

  <!-- Detail slide-over -->
  <div class="overlay" id="overlay"></div>
  <div class="detail-panel" id="detail-panel">
    <div class="detail-header">
      <h3 id="detail-title">Details</h3>
      <button class="detail-close" id="detail-close">&times;</button>
    </div>
    <div class="detail-body" id="detail-body"></div>
  </div>

<script>
// ==== API ====
const API = '/api/v1';
async function api(path, opts = {}) {
  const res = await fetch(API + path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
  });
  return res.json();
}

// ==== State ====
let state = {
  agentRuns: [],
  transactions: [],
  countries: [],
  pendingDecisions: [],
  auditEntries: [],
};

// ==== Detail panel ====
function openDetail(title, html) {
  document.getElementById('detail-title').textContent = title;
  document.getElementById('detail-body').innerHTML = html;
  document.getElementById('detail-panel').classList.add('open');
  document.getElementById('overlay').classList.add('open');
}
function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}
document.getElementById('detail-close').onclick = closeDetail;
document.getElementById('overlay').onclick = closeDetail;

// ==== Navigation ====
let currentPage = 'dashboard';
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', () => {
    currentPage = item.dataset.page;
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    item.classList.add('active');
    render();
  });
});

// ==== Helpers ====
function statusBadge(s) {
  return `<span class="status status-${s}">${s.replace(/_/g, ' ')}</span>`;
}
function shortId(id) { return id ? id.substring(0, 8) : '-'; }
function fmtTime(t) {
  if (!t) return '-';
  const d = new Date(t);
  return d.toLocaleString();
}
function fmtMoney(v, cur) {
  return `${cur || ''} ${Number(v).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`.trim();
}

// ==== Page renderers ====
function render() {
  const titles = {
    dashboard: 'Dashboard', agents: 'Agent Runs', transactions: 'Transactions',
    determine: 'Tax Determination Engine', countries: 'Country Modules',
    decisions: 'Pending Decisions', 'audit-trail': 'Audit Trail',
  };
  document.getElementById('page-title').textContent = titles[currentPage] || '';
  document.getElementById('topbar-actions').innerHTML = '';
  const fn = pages[currentPage];
  if (fn) fn();
}

const pages = {};

// ---- Dashboard ----
pages.dashboard = async function() {
  const el = document.getElementById('content');
  el.innerHTML = '<div class="spinner"></div>';

  const [health, agents, decisions, countries] = await Promise.all([
    api('/../health'),
    api('/agents/types'),
    api('/agents/decisions/pending'),
    api('/compliance/countries'),
  ]);

  state.pendingDecisions = decisions.decisions || [];
  updatePendingBadge();

  el.innerHTML = `
    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">System Status</div>
        <div class="stat-value" style="color:var(--green)">${health.status === 'healthy' ? 'Healthy' : 'Degraded'}</div>
        <div class="stat-sub">v${health.version}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Active Agents</div>
        <div class="stat-value">${(agents.agents || []).length}</div>
        <div class="stat-sub">Specialized AI agents</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Country Modules</div>
        <div class="stat-value">${(countries.countries || []).length}</div>
        <div class="stat-sub">Jurisdictions covered</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Pending Decisions</div>
        <div class="stat-value" style="color:${state.pendingDecisions.length ? 'var(--yellow)' : 'var(--green)'}">${state.pendingDecisions.length}</div>
        <div class="stat-sub">Awaiting human review</div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
      <div class="card">
        <div class="card-header">
          <span class="card-title">Available Agents</span>
        </div>
        <table>
          <thead><tr><th>Agent</th><th>Type</th></tr></thead>
          <tbody>
            ${(agents.agents || []).map(a => `
              <tr onclick="currentPage='agents';document.querySelector('[data-page=agents]').click()">
                <td><strong>${a.name}</strong><br><span style="color:var(--text-dim);font-size:12px">${a.description.substring(0,80)}...</span></td>
                <td><span class="trace-type">${a.type}</span></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-title">Country Coverage</span>
        </div>
        <table>
          <thead><tr><th>Country</th><th>Currency</th><th>Tax Types</th></tr></thead>
          <tbody>
            ${(countries.countries || []).map(c => `
              <tr onclick="showCountryDetail('${c.code}')">
                <td><strong>${c.name}</strong></td>
                <td>${c.currency}</td>
                <td>${c.tax_types.map(t => `<span class="trace-type">${t}</span>`).join(' ')}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
};

// ---- Agents ----
pages.agents = async function() {
  const el = document.getElementById('content');
  el.innerHTML = '<div class="spinner"></div>';

  const agentTypes = await api('/agents/types');

  document.getElementById('topbar-actions').innerHTML = `
    <button class="btn btn-primary" onclick="showInvokeAgent()">Invoke Agent</button>
  `;

  let runsHtml = '';
  if (state.agentRuns.length === 0) {
    runsHtml = `<div class="empty"><div class="empty-icon">&#9881;</div><p>No agent runs yet. Invoke an agent to get started.</p></div>`;
  } else {
    runsHtml = `
      <table>
        <thead><tr><th>Agent</th><th>Status</th><th>Started</th><th>Summary</th><th></th></tr></thead>
        <tbody>
          ${state.agentRuns.map((run, i) => `
            <tr onclick="showAgentRunDetail(${i})">
              <td><strong>${run.agent_name}</strong></td>
              <td>${statusBadge(run.status)}</td>
              <td>${fmtTime(run.started_at)}</td>
              <td style="max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${run.summary || '-'}</td>
              <td><button class="btn btn-sm btn-secondary">View</button></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
  }

  el.innerHTML = `
    <div class="card">
      <div class="card-header"><span class="card-title">Agent Run History</span></div>
      ${runsHtml}
    </div>

    <div class="card">
      <div class="card-header"><span class="card-title">Available Agents</span></div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;">
        ${(agentTypes.agents || []).map(a => `
          <div class="card" style="margin:0;border-left:3px solid var(--accent)">
            <div style="display:flex;justify-content:space-between;align-items:start">
              <div>
                <strong>${a.type}</strong>
                <div style="font-size:12px;color:var(--text-dim);margin-top:4px">${a.description}</div>
              </div>
              <button class="btn btn-sm btn-primary" onclick="showInvokeAgent('${a.type}')">Run</button>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
};

// ---- Invoke Agent Modal (via detail panel) ----
window.showInvokeAgent = function(preselect) {
  const types = ['planning', 'compliance', 'audit_defense', 'regulatory'];
  openDetail('Invoke Agent', `
    <div class="detail-section">
      <h4>Agent Configuration</h4>
      <div class="form-grid">
        <div class="form-group full">
          <label>Agent Type</label>
          <select id="invoke-type">
            ${types.map(t => `<option value="${t}" ${t === preselect ? 'selected' : ''}>${t}</option>`).join('')}
          </select>
        </div>
        <div class="form-group full">
          <label>Jurisdictions (comma-separated)</label>
          <input id="invoke-jurisdictions" value="US,UK,DE" />
        </div>
        <div class="form-group full">
          <label>Parameters (JSON)</label>
          <textarea id="invoke-params" rows="6" style="padding:8px 12px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:13px;font-family:monospace;resize:vertical">${preselect === 'regulatory' ? JSON.stringify({changes:[{jurisdiction:"DE",change_type:"rate_change",title:"German VAT rate increase",description:"Proposed rate change",effective_date:"2026-01-01",impact_level:"high"}]},null,2) : '{}'}</textarea>
        </div>
        <div class="form-group full">
          <button class="btn btn-primary" onclick="runAgent()" style="width:100%;justify-content:center">Invoke Agent</button>
        </div>
        <div id="invoke-result" class="form-group full"></div>
      </div>
    </div>
  `);
};

window.runAgent = async function() {
  const type = document.getElementById('invoke-type').value;
  const jurisdictions = document.getElementById('invoke-jurisdictions').value.split(',').map(s => s.trim()).filter(Boolean);
  let params = {};
  try { params = JSON.parse(document.getElementById('invoke-params').value || '{}'); } catch(e) {}

  document.getElementById('invoke-result').innerHTML = '<div class="spinner"></div> Running...';

  const result = await api('/agents/invoke', {
    method: 'POST',
    body: JSON.stringify({ agent_type: type, jurisdictions, parameters: params }),
  });

  state.agentRuns.unshift(result);

  document.getElementById('invoke-result').innerHTML = `
    <div class="result-box">${JSON.stringify(result, null, 2)}</div>
    <div style="margin-top:12px">${statusBadge(result.status)}</div>
  `;
};

// ---- Agent Run Detail ----
window.showAgentRunDetail = function(idx) {
  const run = state.agentRuns[idx];
  if (!run) return;

  let html = `
    <div class="detail-section">
      <h4>Run Information</h4>
      <div class="detail-row"><span class="label">Agent</span><span>${run.agent_name}</span></div>
      <div class="detail-row"><span class="label">Status</span>${statusBadge(run.status)}</div>
      <div class="detail-row"><span class="label">Started</span><span>${fmtTime(run.started_at)}</span></div>
      <div class="detail-row"><span class="label">Completed</span><span>${fmtTime(run.completed_at)}</span></div>
      <div class="detail-row"><span class="label">Summary</span><span>${run.summary || '-'}</span></div>
    </div>
  `;

  if (run.outputs && Object.keys(run.outputs).length) {
    html += `<div class="detail-section"><h4>Outputs</h4>`;
    for (const [k,v] of Object.entries(run.outputs)) {
      html += `<div class="detail-row"><span class="label">${k}</span><span>${v}</span></div>`;
    }
    html += `</div>`;
  }

  if (run.recommendations && run.recommendations.length) {
    html += `<div class="detail-section"><h4>Recommendations</h4>`;
    run.recommendations.forEach(r => {
      html += `<div class="rec-item">${r}</div>`;
    });
    html += `</div>`;
  }

  if (run.warnings && run.warnings.length) {
    html += `<div class="detail-section"><h4>Warnings</h4>`;
    run.warnings.forEach(w => {
      html += `<div class="rec-item warning">${w}</div>`;
    });
    html += `</div>`;
  }

  if (run.errors && run.errors.length) {
    html += `<div class="detail-section"><h4>Errors</h4>`;
    run.errors.forEach(e => {
      html += `<div class="rec-item error">${e}</div>`;
    });
    html += `</div>`;
  }

  if (run.decision_ids && run.decision_ids.length) {
    html += `<div class="detail-section"><h4>Decisions</h4>`;
    run.decision_ids.forEach(id => {
      html += `<div class="trace-node"><span class="trace-type">decision</span>${shortId(id)}</div>`;
    });
    html += `</div>`;
  }

  if (run.requires_approval) {
    html += `
      <div class="detail-section">
        <h4>Approval Required</h4>
        ${(run.approval_items || []).map(a => `<div class="rec-item warning">${a}</div>`).join('')}
        <div style="margin-top:12px;display:flex;gap:8px">
          <button class="btn btn-approve btn-sm">Approve</button>
          <button class="btn btn-secondary btn-sm" style="color:var(--red)">Reject</button>
        </div>
      </div>
    `;
  }

  html += `
    <div class="detail-section">
      <h4>Raw Response</h4>
      <div class="result-box">${JSON.stringify(run, null, 2)}</div>
    </div>
  `;

  openDetail(`Agent Run: ${run.agent_name}`, html);
};

        </div>
      </div>
      <div id="det-result"></div>

  `;

window.runDetermination = async function() {
  const body = {
    transaction_type: document.getElementById('det-type').value,
    transaction_date: document.getElementById('det-date').value,
    currency: document.getElementById('det-currency').value,
    seller_country: document.getElementById('det-seller').value,
    buyer_country: document.getElementById('det-buyer').value,
    buyer_jurisdiction: document.getElementById('det-jurisdiction').value,
    is_b2b: document.getElementById('det-b2b').checked,
    is_cross_border: document.getElementById('det-crossborder').checked,
    is_digital_service: document.getElementById('det-digital').checked,
    net_amount: document.getElementById('det-amount').value,
    description: document.getElementById('det-desc').value,
  };

  document.getElementById('det-result').innerHTML = '<div style="margin-top:16px"><div class="spinner"></div> Calculating...</div>';

  const result = await api('/compliance/determine-tax', {
    method: 'POST',
    body: JSON.stringify(body),
  });

  const dets = result.determinations || [];
  if (dets.length === 0) {
    document.getElementById('det-result').innerHTML = `
      <div class="result-box" style="border-left:3px solid var(--yellow)">No tax applicable for this transaction configuration.\nThis could mean:\n- Jurisdiction has no tax (e.g. US-OR, US-MT)\n- Transaction is exempt\n- No matching country module</div>
    `;
    return;
  }

  // Save to transactions list
  dets.forEach(d => {
    state.transactions.push({
      id: crypto.randomUUID(),
      date: body.transaction_date,
      type: body.transaction_type,
      net_amount: body.net_amount,
      tax_amount: d.tax_amount,
      tax_rate: d.tax_rate,
      currency: body.currency,
      jurisdiction: d.jurisdiction_code,
      status: 'completed',
      rules_applied: d.rules_applied,
      is_exempt: d.is_exempt,
      is_reverse_charge: d.is_reverse_charge,
    });
  });

  document.getElementById('det-result').innerHTML = `
    <div style="margin-top:16px">
      ${dets.map(d => `
        <div class="card" style="border-left:3px solid var(--green)">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
            <strong>${d.jurisdiction_code} — ${d.tax_type}</strong>
            ${d.is_reverse_charge ? '<span class="status status-waiting_for_approval">reverse charge</span>' : ''}
            ${d.is_exempt ? '<span class="status status-draft">exempt</span>' : ''}
          </div>
          <div class="detail-row"><span class="label">Taxable Amount</span><span>${fmtMoney(d.taxable_amount, body.currency)}</span></div>
          <div class="detail-row"><span class="label">Tax Rate</span><span>${d.tax_rate}%</span></div>
          <div class="detail-row"><span class="label">Tax Amount</span><span style="font-weight:700;color:var(--green)">${fmtMoney(d.tax_amount, body.currency)}</span></div>
          <div style="margin-top:12px">
            <h4 style="font-size:11px;text-transform:uppercase;color:var(--text-dim);margin-bottom:6px">Rules Applied</h4>
            ${d.rules_applied.map(r => `<div class="rec-item">${r}</div>`).join('')}
          </div>
        </div>
      `).join('')}
      <div style="font-size:12px;color:var(--text-dim);margin-top:8px">Transaction saved to transaction log.</div>
    </div>
  `;
};

// ---- Decisions ----
pages.decisions = async function() {
  const el = document.getElementById('content');
  el.innerHTML = '<div class="spinner"></div>';
  const data = await api('/agents/decisions/pending');
  state.pendingDecisions = data.decisions || [];
  updatePendingBadge();

  if (state.pendingDecisions.length === 0) {
    el.innerHTML = `<div class="card"><div class="empty"><div class="empty-icon">&#10004;</div><p>No decisions pending review.</p></div></div>`;
    return;
  }

  el.innerHTML = `
    <div class="card">
      <div class="card-header"><span class="card-title">${state.pendingDecisions.length} Decision(s) Pending Review</span></div>
      ${state.pendingDecisions.map((d, i) => `
        <div class="card" style="margin:8px 0;border-left:3px solid var(--yellow)">
          <div style="display:flex;justify-content:space-between;align-items:start">
            <div>
              <strong>${d.decision_type}</strong>
              <div style="font-size:12px;color:var(--text-dim)">${d.agent_name} &middot; ${fmtTime(d.timestamp)}</div>
            </div>
            <div style="display:flex;gap:6px">
              <button class="btn btn-approve btn-sm">Approve</button>
              <button class="btn btn-secondary btn-sm">Reject</button>
            </div>
          </div>
          <div style="margin-top:10px">
            <div class="detail-row"><span class="label">Question</span><span>${d.question}</span></div>
            <div class="detail-row"><span class="label">Conclusion</span><span>${d.conclusion}</span></div>
            ${d.human_review_reason ? `<div class="detail-row"><span class="label">Review Reason</span><span>${d.human_review_reason}</span></div>` : ''}
          </div>
          ${d.reasoning_steps ? `
            <div style="margin-top:10px">
              <h4 style="font-size:11px;text-transform:uppercase;color:var(--text-dim);margin-bottom:6px">Reasoning Chain</h4>
              <div class="timeline">
                ${d.reasoning_steps.map(s => `<div class="timeline-item"><div class="timeline-text">${s}</div></div>`).join('')}
              </div>
            </div>
          ` : ''}
          ${d.rules_applied ? `
            <div style="margin-top:10px">
              <h4 style="font-size:11px;text-transform:uppercase;color:var(--text-dim);margin-bottom:6px">Rules Referenced</h4>
              ${d.rules_applied.map(r => `<div class="rec-item">${r.regulation_name || r.rule_id}: ${r.summary || ''}</div>`).join('')}
            </div>
          ` : ''}
        </div>
      `).join('')}
    </div>
  `;
};

pages['audit-trail'] = async function() {
  const el = document.getElementById('content');
  el.innerHTML = '<div class="spinner"></div>';
  const data = await api('/agents/audit-trail');
  state.auditEntries = data.entries || [];

  if (state.auditEntries.length === 0) {
    el.innerHTML = `<div class="card"><div class="empty"><div class="empty-icon">&#9776;</div><p>No audit trail entries yet. Run an agent to generate activity.</p></div></div>`;
    return;
  }

  el.innerHTML = `
    <div class="card">
      <div class="card-header"><span class="card-title">Audit Trail (${data.count} entries)</span></div>
      <div class="timeline">
        ${state.auditEntries.map(e => `
          <div class="timeline-item ${e.action === 'error' ? 'error' : e.action === 'warning' ? 'warning' : 'success'}">
            <div class="timeline-time">${fmtTime(e.timestamp)} &middot; ${e.agent_name || 'system'}</div>
            <div class="timeline-text">
              <span class="trace-type">${e.action}</span>
              ${e.description}
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
};

function updatePendingBadge() {
  const badge = document.getElementById('pending-badge');
  if (state.pendingDecisions.length > 0) {
    badge.textContent = state.pendingDecisions.length;
    badge.style.display = '';
  } else {
    badge.style.display = 'none';
  }
}

render();
